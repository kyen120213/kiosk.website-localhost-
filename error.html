<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            user-select: none;
        }

        body {
            background-color: #f4f6f9;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .error-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid #e1e8ed;
        }

        .icon-container {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 700;
        }

        p {
            font-size: 1.1rem;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .status-msg {
            font-weight: 600;
            color: #d32f2f;
            margin-bottom: 30px;
        }

        .action-btn {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        .action-btn:active {
            background-color: #0056b3;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="error-card">
        <div class="icon-container">⚙️</div>
        <h1>System Error</h1>
        <p>This menu or page is currently unavailable.</p>
        <p class="status-msg">IT Support has been contacted to fix this channel.</p>
        
        <button class="action-btn" onclick="goHome()">Return to Directory</button>
    </div>

    <script>
        function goHome() {
            // Instantly returns user to your main Vercel web application directory
            window.location.href = "https://kiosk-website-localhost.vercel.app";
        }
    </script>

</body>
</html>
