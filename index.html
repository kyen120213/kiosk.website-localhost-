<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mall Food Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="kiosk-header">
        <h1>Mall Food Directory</h1>
        <p>Touch a brand to view their menu and order</p>
    </header>

    <main class="grid-container">
        <div class="card" onclick="openStore('https://www.mcdonalds.com')">
            <img src="mcdonalds.png" alt="McDonald's" onerror="this.src='https://via.placeholder.com/150?text=McDonalds'">
            <h3>McDonald's</h3>
        </div>

        <div class="card" onclick="openStore('https://www.subway.com')">
            <img src="subway.png" alt="Subway" onerror="this.src='https://via.placeholder.com/150?text=Subway'">
            <h3>Subway</h3>
        </div>

        <div class="card" onclick="openStore('https://www.starbucks.com')">
            <img src="starbucks.png" alt="Starbucks" onerror="this.src='https://via.placeholder.com/150?text=Starbucks'">
            <h3>Starbucks</h3>
        </div>

        <div class="card" onclick="openStore('https://www.dominos.com')">
            <img src="dominos.png" alt="Domino's" onerror="this.src='https://via.placeholder.com/150?text=Dominos'">
            <h3>Domino's</h3>
        </div>

        <div class="card" onclick="openStore('https://www.google.com/webhp?igu=1')">
            <img src="google.png" alt="Other Place" onerror="this.src='https://via.placeholder.com/150?text=Other+Place'">
            <h3>Other Place</h3>
        </div>
    </main>

    <div id="kiosk-overlay" class="overlay">
        <iframe id="store-frame" src=""></iframe>
    </div>

    <script>
        // Configuration
        const PING_URL = 'https://www.google.com/favicon.ico';
        const PING_INTERVAL = 5000; // Check every 5 seconds
        const PING_TIMEOUT = 3000;  // Fail if server takes > 3 seconds to respond

        // Function to ping a reliable server
        async function checkRealInternet() {
            if (!navigator.onLine) {
                goToOfflinePage();
                return;
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), PING_TIMEOUT);

            try {
                await fetch(`${PING_URL}?t=${Date.now()}`, { 
                    mode: 'no-cors', 
                    signal: controller.signal 
                });
                clearTimeout(timeoutId);
            } catch (error) {
                clearTimeout(timeoutId);
                goToOfflinePage();
            }
        }

        // Directs to local fallback offline.html in C:/kiosk/ if connection drops
        function goToOfflinePage() {
            window.location.href = "file:///C:/kiosk/offline.html";
        }

        window.addEventListener('offline', goToOfflinePage);
        setInterval(checkRealInternet, PING_INTERVAL);

        // Open store website in iframe
        async function openStore(url) {
            if (!navigator.onLine) {
                goToOfflinePage();
                return;
            }
            document.getElementById('store-frame').src = url;
            document.getElementById('kiosk-overlay').classList.add('active');
        }
    </script>
</body>
</html>
